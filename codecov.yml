coverage:
  status:
    project:
      default:
        threshold: 1%
    patch:
      default:
        threshold: 5%

  range: 60..80
  round: down
  precision: 2

comment:
  layout: "reach,diff,files"
  behavior: default
  require_changes: true

flags:
  rust:
    paths:
      - "src/**"
      - "Cargo.toml"

ignore:
  - "ccpt_local/**"
  - "collection/**"
  - "example-files/**"
  - "migrations/**"
  - "node_modules/**"
  - "target/**"
  - "src/ccpt/infrastructure.rs"
  - "src/ccpt/main.rs"
