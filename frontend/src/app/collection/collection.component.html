<div class="px-8 py-12 max-w-7xl mx-auto max-sm:px-4 max-sm:py-8">
  <!-- Hero header -->
  <div class="flex items-start justify-between gap-8 flex-wrap max-sm:flex-col">
    <div>
      <h1
        class="font-sans text-[clamp(2.5rem,5vw,4rem)] font-bold tracking-[-0.02em] text-on-surface mt-0 mb-1 leading-[1.1]"
      >
        Ma Collection
      </h1>
      <p class="font-sans text-base text-on-surface-variant m-0">0 cartes dans votre collection.</p>
    </div>

    <!-- Bouton Import -->
    <button
      class="inline-flex items-center gap-2 py-2 px-5 border-0 rounded-lg bg-primary text-on-primary font-sans text-sm font-semibold cursor-pointer transition-[opacity,transform] duration-150 ease-in whitespace-nowrap shrink-0 enabled:hover:opacity-[0.88] enabled:hover:scale-[1.02] enabled:active:scale-[0.97] disabled:opacity-40 disabled:cursor-not-allowed max-sm:w-full max-sm:justify-center"
      (click)="triggerFileInput()"
      [disabled]="isLoading()"
      aria-label="Importer une collection ManaBox"
    >
      @if (isLoading()) {
        <mat-icon
          fontSet="material-symbols-rounded"
          class="text-[1.125rem] w-4.5 h-4.5 leading-none flex items-center justify-center animate-spin"
        >
          progress_activity
        </mat-icon>
        Importation&hellip;
      } @else {
        <mat-icon
          fontSet="material-symbols-rounded"
          class="text-[1.125rem] w-4.5 h-4.5 leading-none flex items-center justify-center"
        >
          upload_file
        </mat-icon>
        Importer une collection ManaBox
      }
    </button>

    <!-- Input fichier masqué -->
    <input
      #fileInput
      type="file"
      accept=".csv"
      hidden
      (change)="onFileSelected($event)"
      aria-hidden="true"
    />
  </div>
</div>
