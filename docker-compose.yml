services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - /mnt/ssd/containers/config/ccpt:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ccpt:
    image: ghcr.io/michaelcoll/card-collection-price-tracker:1.6.2
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/postgres
      PORT: 8080
      CARDMARKET_PRICE_GUIDES_URL: https://downloads.s3.cardmarket.com/productCatalog/priceGuide/price_guide_1.json
      EDHREC_BASE_URL: https://edhrec.com
      SCRYFALL_BASE_URL: https://api.scryfall.com
      CLERK_FRONTEND_API_URL: ${CLERK_FRONTEND_API_URL}
    ports:
      - "8080:8080"

  frontend:
    image: ghcr.io/michaelcoll/card-collection-price-tracker-frontend:1.6.2
    pull_policy: always
    restart: unless-stopped
    ports:
      - "9797:80"
    depends_on:
      - ccpt
