[env]
# Database
POSTGRES_USER = "postgres"
POSTGRES_PASSWORD = "password"
POSTGRES_DB = "postgres"
DATABASE_URL = "postgresql://postgres:password@localhost:5432/postgres"

# Server
BACKEND_PORT = "8080"

# External APIs
CARDMARKET_PRICE_GUIDES_URL = "https://downloads.s3.cardmarket.com/productCatalog/priceGuide/price_guide_1.json"
EDHREC_BASE_URL = "https://edhrec.com"
SCRYFALL_BASE_URL = "https://api.scryfall.com"

[tools]
"cargo:cargo-llvm-cov" = { version = "latest", features = "llvm-tools-preview" }
"cargo:cargo-nextest" = "latest"
"cargo:sqlx-cli" = "latest"
"cargo:https://github.com/rtk-ai/rtk" = "latest"
node = "24"
pnpm = "11"

[tasks.default]
description = "Runs all the checks for the project"
depends = ["openapi", "sqlx-prepare", "format", "test", "lint"]

[tasks.clean-backend]
run = "cargo clean"
hide = true

[tasks.clean-frontend]
dir = "frontend-vue"
run = "rm -fr .nuxt .output node_modules"
hide = true

[tasks.clean]
description = "Cleans the project artifacts"
depends = ["clean-backend", "clean-frontend"]
alias = ["c"]

[tasks.install-frontend-deps]
dir = "frontend-vue"
depends = ["clean-frontend"]
run = "pnpm install"
hide = true

[tasks.setup]
description = "Setups the project for development"
depends = ["clean", "install-frontend-deps"]

[tasks.openapi]
description = "Generates the OpenAPI specification"
depends_post = ["format-frontend"]
run = "cargo run --bin generate-openapi"
alias = ["o"]

[tasks.sqlx-prepare]
description = "Generates the SQLx metadata for the project"
run = "rm -fr .sqlx && cargo sqlx prepare"

[tasks.test]
description = "Tests the backend"
run = "cargo test"
alias = ["t"]

[tasks.lint-clippy]
run = "cargo clippy --locked --workspace --all-features --all-targets -- -A dead_code -D clippy::all"
hide = true

[tasks.lint-sqlx]
depends = ["sqlx-prepare"]
run = "cargo sqlx prepare --check"
hide = true

[tasks.lint]
description = "Lints the backend of project"
depends = ["lint-clippy", "lint-sqlx"]
alias = ["l"]

[tasks.format-backend]
run = "cargo fmt"
hide = true

[tasks.format-frontend]
dir = "frontend-vue"
run = "pnpm lint:fix"
hide = true

[tasks.format]
description = "Formats the codebase"
depends = ["format-backend", "format-frontend"]
alias = ["f"]

[tasks.migrate]
description = "Runs the database migrations"
run = "sqlx migrate run"

[tasks.upgrade-backend]
run = "cargo update"
hide = true

[tasks.upgrade-frontend]
dir = "frontend-vue"
run = "pnpm update"
hide = true

[tasks.upgrade]
description = "Upgrades the project dependencies"
depends = ["upgrade-backend", "upgrade-frontend"]

[tasks.back]
description = "Runs the backend server"
run = "cargo run --bin ccpt"

[tasks.front]
description = "Runs the frontend development server"
dir = "frontend-vue"
run = "pnpm dev"

[tasks.build-backend]
description = "Builds the backend"
run = "cargo build"
alias = ["bb"]

[tasks.build-frontend]
description = "Builds the frontend"
dir = "frontend-vue"
depends = ["install-frontend-deps"]
run = "pnpm build"
alias = ["bf"]
