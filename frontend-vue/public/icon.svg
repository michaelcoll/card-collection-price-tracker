<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Arcane Exchange">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2126"></stop>
      <stop offset="1" stop-color="#0a0b0d"></stop>
    </linearGradient>
    <radialGradient id="gl" cx="30%" cy="16%" r="80%">
      <stop offset="0" stop-color="#00daf3" stop-opacity=".22"></stop>
      <stop offset="55%" stop-color="#00daf3" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="cy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2ce6f9"></stop>
      <stop offset="1" stop-color="#00bdd6"></stop>
    </linearGradient>
    <linearGradient id="vi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dccdff"></stop>
      <stop offset="1" stop-color="#b095ff"></stop>
    </linearGradient>
  </defs>

  
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"></rect>
  <rect width="1024" height="1024" rx="232" fill="url(#gl)"></rect>
  <rect x="3" y="3" width="1018" height="1018" rx="230" fill="none" stroke="#ffffff" stroke-opacity=".06" stroke-width="2"></rect>

  
  <g fill="none" stroke-width="48" stroke-linejoin="round">
    <rect x="312" y="384" width="256" height="256" rx="62" transform="rotate(45 440 512)" stroke="url(#cy)"></rect>
    <rect x="456" y="384" width="256" height="256" rx="62" transform="rotate(45 584 512)" stroke="url(#vi)"></rect>
  </g>
</svg>