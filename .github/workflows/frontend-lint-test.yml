name: lint-test-frontend

on:
  push

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend-vue/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: frontend-vue

      - name: Prettier Check
        working-directory: frontend-vue
        run: pnpm lint

  build-dev:
    name: Build Development
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend-vue/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: frontend-vue

      - name: Build Development
        working-directory: frontend-vue
        run: pnpm build --configuration development

  build-production:
    name: Build Production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend-vue/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: frontend-vue

      - name: Build Production
        working-directory: frontend-vue
        run: pnpm build
