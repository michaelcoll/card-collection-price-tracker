name: build-and-push

on:
  push:
    branches:
      - main
  release:
    types: [ created ]

jobs:
  build-and-push-backend:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend Extract metadata (tags, labels) for Docker
        id: meta-back
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/michaelcoll/card-collection-price-tracker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          pull: true
          push: true
          tags: ${{ steps.meta-back.outputs.tags }}
          labels: ${{ steps.meta-back.outputs.labels }}

  build-and-push-frontend:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Frontend Extract metadata (tags, labels) for Docker
        id: meta-front
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/michaelcoll/card-collection-price-tracker-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker frontend image
        uses: docker/build-push-action@v7
        with:
          context: frontend/
          platforms: linux/amd64
          pull: true
          push: true
          tags: ${{ steps.meta-front.outputs.tags }}
          labels: ${{ steps.meta-front.outputs.labels }}

