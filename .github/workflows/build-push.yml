name: build-and-push

on:
  push:
    branches:
      - main
  release:
    types: [ created ]

jobs:
  build-and-push-backend:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend Extract metadata (tags, labels) for Docker
        id: meta-back
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/michaelcoll/card-collection-price-tracker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Bump version for release
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          sed -i "s/^version = \".*\"/version = \"$TAG\"/" Cargo.toml

      - name: Build and push Docker backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          pull: true
          push: true
          tags: ${{ steps.meta-back.outputs.tags }}
          labels: ${{ steps.meta-back.outputs.labels }}

      - name: Restore Cargo.toml version
        if: github.event_name == 'release'
        run: |
          sed -i 's/^version = ".*"/version = "0.1.0"/' Cargo.toml

      - name: Create Sentry release
        if: github.event_name == 'release'
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_BACK }}
        with:
          environment: production
          ignore_missing: 'true'
          release: ${{ github.event.release.tag_name }}

  build-and-push-frontend:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Frontend Extract metadata (tags, labels) for Docker
        id: meta-front
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/michaelcoll/card-collection-price-tracker-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Bump version for release
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$TAG\"/" frontend-vue/package.json

      - name: Build and push Docker frontend image
        uses: docker/build-push-action@v7
        with:
          context: frontend-vue/
          platforms: linux/amd64
          pull: true
          push: true
          tags: ${{ steps.meta-front.outputs.tags }}
          labels: ${{ steps.meta-front.outputs.labels }}

      - name: Restore package.json version
        if: github.event_name == 'release'
        run: |
          sed -i 's/\"version\": \".*\"/\"version\": \"0.0.0\"/' frontend-vue/package.json

  publish-frontend-sourcemaps:

    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend-vue/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: frontend-vue

      - name: Create Sentry release and upload source maps
        working-directory: frontend-vue
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_FRONT }}
        run: pnpm build
