version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 * * * *"
